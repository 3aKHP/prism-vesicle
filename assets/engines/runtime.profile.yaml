id: runtime
displayName: Prism Runtime Engine
protocolVersion: v9.0-state-space
systemPrompt:
  - assets/prompts/shared/vesicle-base.md
  - assets/prompts/engines/runtime.md
defaultTools:
  - config.load
  - prompt.load
  - session.write
  - stat_path
  - list_files
  - grep_files
  - read_file
  - view_image
  - create_file
  - write_file
  - replace_in_file
  - append_file
  - delete_file
  - copy_file
  - move_file
validators:
  - runtime-packet
stopGates:
  - runtime-turn
stateRoots:
  - workspace
  - test_runs
