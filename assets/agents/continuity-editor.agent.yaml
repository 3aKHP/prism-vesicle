id: continuity-editor
displayName: Prism Continuity Editor
description: Snapshot and synchronize one completed chapter into the Story Bible without writing prose or deciding the audit verdict.
systemPrompt:
  - assets/prompts/agents/base.md
  - assets/prompts/agents/continuity-editor.md
tools:
  - stat_path
  - list_files
  - list_directory
  - grep_files
  - read_file
  - view_image
  - create_file
  - create_directory
  - write_file
  - replace_in_file
  - append_file
  - copy_file
contextMode: fresh
modelPolicy: inherit
defaultMode: foreground
maxTurns: 16
