name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run pack:check

  linux-artifact:
    name: Linux ELF smoke
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build:exe linux
      - run: bun run build:assets
      - name: Smoke the release shape
        run: |
          mkdir -p smoke/release smoke/project
          cp prism-vesicle smoke/release/prism-vesicle
          unzip -q dist/prism-vesicle-assets.zip -d smoke/release
          (
            cd smoke/project
            ../release/prism-vesicle debug markdown-runtime
            ../release/prism-vesicle assets status
            ../release/prism-vesicle assets materialize assets/prompts/shared/vesicle-base.md
            test -f assets/prompts/shared/vesicle-base.md
            VESICLE_CONFIG_DIR="$PWD/config" ../release/prism-vesicle assets materialize assets/prompts/engines/etl.md --global
            VESICLE_CONFIG_DIR="$PWD/config" ../release/prism-vesicle prompt shape --engine etl
          )
      - uses: actions/upload-artifact@v4
        with:
          name: prism-vesicle-linux-x64
          path: |
            prism-vesicle
            dist/prism-vesicle-assets.zip
          retention-days: 7

  windows-artifact:
    name: Windows PE smoke
    needs: checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Test Windows permission and process runtime
        run: bun test tests/permission-config.test.ts tests/permissions.test.ts tests/process-runtime.test.ts tests/shell-profile.test.ts tests/setup-model-discovery.test.ts tests/setup-config-writer.test.ts tests/setup-mcp-test.test.ts tests/setup-ui.test.tsx tests/windows-installer.test.ts
      - run: bun run build:exe windows
      - run: bun run build:assets
      - name: Smoke the release shape
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force smoke/release, smoke/project | Out-Null
          Copy-Item prism-vesicle.exe smoke/release/prism-vesicle.exe
          Expand-Archive -LiteralPath dist/prism-vesicle-assets.zip -DestinationPath smoke/release
          Push-Location smoke/project
          try {
            $env:VESICLE_CONFIG_DIR = Join-Path (Get-Location) 'config'
            & ..\release\prism-vesicle.exe debug markdown-runtime
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe assets status
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe assets materialize assets/prompts/shared/vesicle-base.md
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if (-not (Test-Path assets/prompts/shared/vesicle-base.md)) { throw 'Project override was not written beneath the invocation cwd.' }
            & ..\release\prism-vesicle.exe assets materialize assets/prompts/engines/etl.md --global
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe prompt shape --engine etl
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            Pop-Location
          }
      - name: Install pinned Inno Setup
        shell: pwsh
        run: choco install innosetup --version=6.7.1 --no-progress -y
      - name: Build guided installer
        run: bun run build:installer
      - name: Smoke install and uninstall
        shell: pwsh
        run: ./scripts/smoke-windows-installer.ps1 -InstallerPath "dist/PrismVesicleSetup-*-windows-x64.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: prism-vesicle-windows-x64
          path: |
            prism-vesicle.exe
            dist/prism-vesicle-assets.zip
            dist/PrismVesicleSetup-*-windows-x64.exe
          retention-days: 7
