name: Release verification

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label for the candidate artifacts, without a leading v
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Validate candidate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]
          test "$VERSION" = "$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
      - run: bun run typecheck
      - run: bun test
      - run: bun audit
      - run: bun run pack:check
      - run: bun run pack:smoke

  linux:
    name: Linux candidate
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build:exe linux
      - run: bun run build:assets
      - name: Smoke the release shape
        run: |
          mkdir -p smoke/release smoke/project
          cp prism-vesicle smoke/release/prism-vesicle
          unzip -q dist/prism-vesicle-assets.zip -d smoke/release
          (
            cd smoke/project
            ../release/prism-vesicle debug markdown-runtime
            ../release/prism-vesicle assets status
            ../release/prism-vesicle assets materialize assets/prompts/shared/vesicle-base.md
            test -f assets/prompts/shared/vesicle-base.md
            VESICLE_CONFIG_DIR="$PWD/config" ../release/prism-vesicle assets materialize assets/prompts/engines/etl.md --global
            VESICLE_CONFIG_DIR="$PWD/config" ../release/prism-vesicle prompt shape --engine etl
          )
      - name: Name release artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir release
          cp prism-vesicle "release/prism-vesicle-linux-x64-${VERSION}"
          cp dist/prism-vesicle-assets.zip "release/prism-vesicle-assets-${VERSION}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ inputs.version }}
          path: release/
          retention-days: 30

  windows:
    name: Windows candidate
    needs: checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build:exe windows
      - run: bun run build:assets
      - name: Smoke the release shape
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force smoke/release, smoke/project | Out-Null
          Copy-Item prism-vesicle.exe smoke/release/prism-vesicle.exe
          Expand-Archive -LiteralPath dist/prism-vesicle-assets.zip -DestinationPath smoke/release
          Push-Location smoke/project
          try {
            $env:VESICLE_CONFIG_DIR = Join-Path (Get-Location) 'config'
            & ..\release\prism-vesicle.exe debug markdown-runtime
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe assets status
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe assets materialize assets/prompts/shared/vesicle-base.md
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if (-not (Test-Path assets/prompts/shared/vesicle-base.md)) { throw 'Project override was not written beneath the invocation cwd.' }
            & ..\release\prism-vesicle.exe assets materialize assets/prompts/engines/etl.md --global
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe prompt shape --engine etl
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            Pop-Location
          }
      - name: Name release artifact
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item prism-vesicle.exe "release/prism-vesicle-windows-x64-$env:VERSION.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ inputs.version }}
          path: release/
          retention-days: 30
