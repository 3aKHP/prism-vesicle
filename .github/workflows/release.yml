name: Publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag whose npm publish should be retried
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    name: Verify tag and package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - id: version
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test "$TAG" = "v$VERSION"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
      - run: bun run typecheck
      - run: bun test
      - run: bun audit
      - run: bun run pack:check
      - run: bun run pack:smoke

  linux:
    name: Build Linux release artifact
    if: github.event_name != 'workflow_dispatch'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build:exe linux
      - run: bun run build:assets
      - name: Smoke the release shape
        run: |
          mkdir smoke
          cp prism-vesicle smoke/prism-vesicle
          unzip -q dist/prism-vesicle-assets.zip -d smoke
          (
            cd smoke
            ./prism-vesicle debug markdown-runtime
            ./prism-vesicle prompt shape --engine etl
          )
      - name: Name release artifacts
        env:
          VERSION: ${{ needs.checks.outputs.version }}
        run: |
          mkdir release
          cp prism-vesicle "release/prism-vesicle-linux-x64-${VERSION}"
          cp dist/prism-vesicle-assets.zip "release/prism-vesicle-assets-${VERSION}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: publish-linux
          path: release/

  windows:
    name: Build Windows release artifact
    if: github.event_name != 'workflow_dispatch'
    needs: checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build:exe windows
      - run: bun run build:assets
      - name: Smoke the release shape
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force smoke | Out-Null
          Copy-Item prism-vesicle.exe smoke/prism-vesicle.exe
          Expand-Archive -LiteralPath dist/prism-vesicle-assets.zip -DestinationPath smoke
          Push-Location smoke
          try {
            & .\prism-vesicle.exe debug markdown-runtime
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & .\prism-vesicle.exe prompt shape --engine etl
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            Pop-Location
          }
      - name: Name release artifact
        shell: pwsh
        env:
          VERSION: ${{ needs.checks.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item prism-vesicle.exe "release/prism-vesicle-windows-x64-$env:VERSION.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: publish-windows
          path: release/

  github-release:
    name: Publish GitHub Release
    if: github.event_name != 'workflow_dispatch'
    needs: [checks, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: publish-*
          merge-multiple: true
          path: release
      - name: Write checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          name: Prism Vesicle v${{ needs.checks.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: release/*

  npm:
    name: Publish npm package
    if: github.event_name != 'workflow_dispatch'
    needs: [checks, github-release]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # npm Trusted Publishing requires Node 24's npm 11 OIDC implementation;
      # setup-node also writes the public registry configuration.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --provenance --access public --tag latest

  npm-retry:
    name: Retry npm package publish
    if: github.event_name == 'workflow_dispatch'
    needs: checks
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.checks.outputs.tag }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Publish the verified tag package
        env:
          VERSION: ${{ needs.checks.outputs.version }}
        run: |
          if npm view "prism-vesicle@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "prism-vesicle@$VERSION is already published; nothing to retry."
            exit 0
          fi
          npm publish --provenance --access public --tag latest
