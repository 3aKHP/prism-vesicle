name: Reusable release build

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Exact branch, tag, or commit to verify
        required: true
        type: string
      expected_version:
        description: Expected package.json version; empty accepts the checked-out version
        required: false
        default: ""
        type: string
      artifact_prefix:
        description: Prefix that identifies the caller and publication intent
        required: true
        type: string
      retention_days:
        description: Artifact retention period
        required: true
        type: number
    outputs:
      version:
        description: Verified package.json version
        value: ${{ jobs.checks.outputs.version }}

permissions:
  contents: read

jobs:
  checks:
    name: Typecheck, tests, audit, and package smoke
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - id: version
        name: Validate package version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          VERSION="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]
          if [[ -n "$EXPECTED_VERSION" ]]; then
            test "$VERSION" = "$EXPECTED_VERSION"
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun audit
      - run: bun run pack:check
      - run: bun run pack:smoke

  linux:
    name: Linux ELF release smoke
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build:exe linux
      - run: bun run build:assets
      - name: Smoke the release shape from an empty project
        run: |
          mkdir -p smoke/release smoke/project
          cp prism-vesicle smoke/release/prism-vesicle
          unzip -q dist/prism-vesicle-assets.zip -d smoke/release
          (
            cd smoke/project
            ../release/prism-vesicle debug markdown-runtime
            ../release/prism-vesicle assets status
            ../release/prism-vesicle assets materialize assets/prompts/shared/vesicle-base.md
            test -f assets/prompts/shared/vesicle-base.md
            VESICLE_CONFIG_DIR="$PWD/config" ../release/prism-vesicle assets materialize assets/prompts/engines/etl.md --global
            VESICLE_CONFIG_DIR="$PWD/config" ../release/prism-vesicle prompt shape --engine etl
          )
      - name: Stage versioned Linux artifacts
        env:
          VERSION: ${{ needs.checks.outputs.version }}
        run: |
          mkdir release
          cp prism-vesicle "release/prism-vesicle-linux-x64-${VERSION}"
          cp dist/prism-vesicle-assets.zip "release/prism-vesicle-assets-${VERSION}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-linux-${{ needs.checks.outputs.version }}
          path: release/
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}

  windows:
    name: Windows installer release smoke
    needs: checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Test Windows-specific permission, process, Setup, and installer paths
        run: bun test tests/permission-config.test.ts tests/permissions.test.ts tests/process-runtime.test.ts tests/shell-profile.test.ts tests/setup-model-discovery.test.ts tests/setup-config-writer.test.ts tests/setup-mcp-test.test.ts tests/setup-ui.test.tsx tests/windows-installer.test.ts
      - run: bun run build:exe windows
      - run: bun run build:assets
      - name: Smoke the release shape from an empty project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force smoke/release, smoke/project | Out-Null
          Copy-Item prism-vesicle.exe smoke/release/prism-vesicle.exe
          Expand-Archive -LiteralPath dist/prism-vesicle-assets.zip -DestinationPath smoke/release
          Push-Location smoke/project
          try {
            $env:VESICLE_CONFIG_DIR = Join-Path (Get-Location) 'config'
            & ..\release\prism-vesicle.exe debug markdown-runtime
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe assets status
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe assets materialize assets/prompts/shared/vesicle-base.md
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if (-not (Test-Path assets/prompts/shared/vesicle-base.md)) { throw 'Project override was not written beneath the invocation cwd.' }
            & ..\release\prism-vesicle.exe assets materialize assets/prompts/engines/etl.md --global
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ..\release\prism-vesicle.exe prompt shape --engine etl
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            Pop-Location
          }
      - name: Install pinned Inno Setup
        shell: pwsh
        run: choco install innosetup --version=6.7.1 --no-progress -y
      - name: Build and smoke the guided installer
        shell: pwsh
        run: |
          bun run build:installer
          ./scripts/smoke-windows-installer.ps1 -InstallerPath "dist/PrismVesicleSetup-*-windows-x64.exe"
      - name: Stage versioned Windows artifacts
        shell: pwsh
        env:
          VERSION: ${{ needs.checks.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item prism-vesicle.exe "release/prism-vesicle-windows-x64-$env:VERSION.exe"
          Copy-Item "dist/PrismVesicleSetup-$env:VERSION-windows-x64.exe" release/
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-windows-${{ needs.checks.outputs.version }}
          path: release/
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
